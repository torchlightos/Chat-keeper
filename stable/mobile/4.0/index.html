<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Keeper Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0f1a; color: #e5e7eb; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'Fira Code', monospace; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .chat-user { background: #1e293b; align-self: flex-end; border-radius: 1rem 1rem 0 1rem; border: 1px solid #334155; }
        .chat-assistant { background: #064e3b; align-self: flex-start; border-radius: 1rem 1rem 1rem 0; border: 1px solid #065f46; }
        .card-active { border-color: #8b5cf6 !important; background: rgba(139, 92, 246, 0.05); }
        .animate-in { animation: slideUp 0.2s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Prevent elastic scroll on mobile */
        html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; }
    </style>
</head>
<body class="flex flex-col">

    <!-- LOCK SCREEN -->
    <div id="lock-screen" class="fixed inset-0 bg-[#0b0f1a] flex items-center justify-center p-8 z-[10000] text-center">
        <div class="w-full max-w-xs space-y-8">
            <div class="bg-violet-600/20 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto border border-violet-500/30">
                <i data-lucide="shield-check" class="w-10 h-10 text-violet-500"></i>
            </div>
            <div class="space-y-2">
                <h1 class="text-2xl font-extrabold text-white">Vault Locked</h1>
                <p class="text-gray-500 text-sm">Enter master key <span class="text-violet-400">222</span></p>
            </div>
            <div class="space-y-4">
                <input type="password" id="keyInput" inputmode="numeric" placeholder="••••" class="w-full bg-gray-900 border border-gray-800 rounded-2xl px-4 py-4 text-center text-3xl font-mono focus:border-violet-500 outline-none text-white tracking-widest">
                <button onclick="activateKey()" class="w-full bg-violet-600 active:bg-violet-700 py-4 rounded-2xl font-bold text-lg shadow-lg transition-transform active:scale-[0.98]">Unlock Archive</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="app-content" class="flex flex-col h-full hidden overflow-hidden">
        
        <!-- HEADER -->
        <header class="pt-12 pb-4 px-5 flex justify-between items-center bg-[#0b0f1a] shrink-0">
            <div class="flex items-center gap-3">
                <div class="bg-violet-600 p-1.5 rounded-xl"><i data-lucide="database" class="w-5 h-5 text-white"></i></div>
                <div>
                    <h1 class="text-lg font-extrabold leading-none">Chat Keeper</h1>
                    <span class="text-violet-400 text-[10px] mono uppercase tracking-widest">v3.0 Mobile Pro</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <input type="file" id="fileInput" class="hidden" accept=".json">
                <button onclick="document.getElementById('fileInput').click()" class="bg-violet-600 active:scale-95 p-2.5 rounded-xl transition">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
                <button onclick="resetLicense()" class="p-2.5 text-gray-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </header>

        <!-- SEARCH BAR (FULL WIDTH) -->
        <div class="px-5 pb-4 shrink-0">
            <div class="relative w-full">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 text-gray-500"></i>
                <input type="text" id="searchInput" placeholder="Search conversations..." class="w-full bg-gray-900 border border-gray-800 rounded-2xl py-4 pl-12 pr-4 focus:border-violet-500 outline-none text-base text-white appearance-none shadow-inner">
            </div>
        </div>

        <!-- CONTENT AREA -->
        <main id="contentArea" class="flex-1 overflow-y-auto px-5 pb-32 space-y-3">
            <div id="chatGrid" class="flex flex-col gap-3">
                <!-- Cards injected here -->
            </div>
        </main>

        <!-- BOTTOM NAV -->
        <nav class="fixed bottom-0 left-0 right-0 bg-[#0b0f1a]/95 backdrop-blur-xl border-t border-gray-800/50 flex justify-around items-center px-6 safe-area-bottom h-20 z-50">
            <button onclick="setView('library')" id="nav-library" class="flex flex-col items-center gap-1 text-gray-500 transition-colors">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Library</span>
            </button>
            <button onclick="toggleExportMenu()" class="flex flex-col items-center gap-1 text-violet-400 relative">
                <div class="bg-violet-600/10 p-3 rounded-full -mt-8 border border-violet-500/20 shadow-xl">
                    <i data-lucide="download" class="w-6 h-6"></i>
                </div>
                <span class="text-[10px] font-bold uppercase tracking-tighter mt-1">Export</span>
                <!-- EXPORT MENU -->
                <div id="exportMenu" class="hidden absolute bottom-24 left-1/2 -translate-x-1/2 w-48 bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col">
                    <button onclick="exportAs('json')" class="p-4 text-xs font-bold border-b border-gray-800 active:bg-violet-600/20 text-left flex items-center gap-3"><i data-lucide="code" class="w-4"></i> JSON ARCHIVE</button>
                    <button onclick="exportAs('txt')" class="p-4 text-xs font-bold border-b border-gray-800 active:bg-violet-600/20 text-left flex items-center gap-3"><i data-lucide="file-text" class="w-4"></i> PLAIN TEXT</button>
                    <button onclick="exportAs('md')" class="p-4 text-xs font-bold active:bg-violet-600/20 text-left flex items-center gap-3"><i data-lucide="book-open" class="w-4"></i> NOTEBOOK LM</button>
                </div>
            </button>
            <button onclick="setView('collections')" id="nav-collections" class="flex flex-col items-center gap-1 text-gray-500 transition-colors">
                <i data-lucide="star" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Starred</span>
            </button>
        </nav>
    </div>

    <!-- DETAIL MODAL -->
    <div id="detailModal" class="fixed inset-0 bg-black z-[1000] hidden flex flex-col">
        <header class="pt-12 pb-4 px-5 flex justify-between items-center bg-gray-900/40 border-b border-gray-800 shrink-0">
            <button onclick="closeModal()" class="p-2 -ml-2 text-gray-400 active:text-white"><i data-lucide="chevron-left" class="w-7 h-7"></i></button>
            <h2 id="modalTitle" class="font-bold truncate text-sm flex-1 text-center px-4">Detail</h2>
            <div class="flex gap-1">
                <button onclick="reviveConversation()" class="p-2 text-violet-400 active:scale-90"><i data-lucide="copy" class="w-5 h-5"></i></button>
                <button id="modalStarBtn" class="p-2 active:scale-90"><i data-lucide="star" class="w-5 h-5"></i></button>
            </div>
        </header>
        <div id="modalTranscript" class="flex-1 overflow-y-auto p-5 flex flex-col gap-5 pb-20"></div>
    </div>

    <div id="toast" class="fixed top-14 left-1/2 -translate-x-1/2 px-6 py-3 bg-violet-600 text-white text-xs font-black rounded-full shadow-2xl opacity-0 transition-all z-[11000] pointer-events-none uppercase tracking-widest"></div>

    <script>
        let db, allChats = [], starredIds = new Set(), activeChatId = null, currentView = 'library';

        const initDB = () => new Promise(resolve => {
            const req = indexedDB.open("ChatKeeperV3", 1);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                if (!d.objectStoreNames.contains("archive")) d.createObjectStore("archive", { keyPath: "id" });
                if (!d.objectStoreNames.contains("meta")) d.createObjectStore("meta", { keyPath: "id" });
            };
            req.onsuccess = e => { db = e.target.result; resolve(); };
        });

        async function loadData() {
            if (!db) return;
            const tx = db.transaction(["archive", "meta"], "readonly");
            allChats = await new Promise(r => { 
                const req = tx.objectStore("archive").getAll(); 
                req.onsuccess = () => r(req.result || []); 
            });
            const metas = await new Promise(r => { 
                const req = tx.objectStore("meta").getAll(); 
                req.onsuccess = () => r(req.result || []); 
            });
            starredIds = new Set(metas.filter(m => m.starred).map(m => m.id));
            updateUI();
        }

        async function activateKey() {
            const val = document.getElementById('keyInput').value || localStorage.getItem('ck_v3_key');
            if (val === '222') {
                localStorage.setItem('ck_v3_key', '222');
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                await initDB(); 
                await loadData();
                document.getElementById('searchInput').addEventListener('input', updateUI);
            }
        }

        document.getElementById('fileInput').onchange = async e => {
            if (!e.target.files.length) return;
            try {
                const text = await e.target.files[0].text();
                const raw = JSON.parse(text);
                const processed = raw.map(c => ({
                    id: c.id, 
                    title: c.title || "Untitled", 
                    date: new Date(c.create_time * 1000).toLocaleDateString(),
                    messages: Object.values(c.mapping || {}).filter(m => m.message?.content?.parts).map(m => ({
                        role: m.message.author.role, 
                        text: (m.message.content.parts || []).join('\n')
                    }))
                })).filter(c => c.messages.length > 0);

                const tx = db.transaction("archive", "readwrite");
                processed.forEach(c => tx.objectStore("archive").put(c));
                tx.oncomplete = () => {
                    showToast(`Imported ${processed.length} chats`);
                    loadData();
                };
            } catch (err) {
                showToast("Invalid JSON");
            }
        };

        function renderGrid(chats) {
            const grid = document.getElementById('chatGrid');
            if (!chats.length) {
                grid.innerHTML = `<div class="py-20 text-center text-gray-600 text-sm font-bold uppercase tracking-widest opacity-50">Empty Archive</div>`;
                return;
            }
            grid.innerHTML = chats.map(c => {
                const isStarred = starredIds.has(c.id);
                return `
                <div onclick="viewDetail('${c.id}')" class="group relative bg-gray-900/40 border ${isStarred ? 'border-yellow-500/30 bg-yellow-500/[0.03]' : 'border-gray-800/60'} p-5 rounded-3xl active:scale-[0.98] transition-all animate-in">
                    <div class="flex justify-between items-start gap-4">
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold truncate text-gray-100 mb-1">${c.title}</h3>
                            <p class="text-xs text-gray-500 line-clamp-1 mb-3">${c.messages[0]?.text || 'No preview'}</p>
                            <div class="flex items-center gap-3 text-[10px] font-bold mono text-gray-600">
                                <span class="bg-gray-800 px-2 py-0.5 rounded-lg">${c.date}</span>
                                <span>${c.messages.length} MSG</span>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); toggleStar('${c.id}')" class="p-3 -mt-2 -mr-2 rounded-2xl active:bg-gray-800 transition">
                            <i data-lucide="star" class="w-6 h-6 ${isStarred ? 'fill-yellow-500 text-yellow-500' : 'text-gray-700'}"></i>
                        </button>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        async function toggleStar(id) {
            const tx = db.transaction("meta", "readwrite");
            const store = tx.objectStore("meta");
            const isStarred = starredIds.has(id);
            if (isStarred) {
                starredIds.delete(id);
                store.put({ id, starred: false });
            } else {
                starredIds.add(id);
                store.put({ id, starred: true });
            }
            tx.oncomplete = () => updateUI();
        }

        function viewDetail(id) {
            activeChatId = id;
            const c = allChats.find(x => x.id === id);
            if (!c) return;
            document.getElementById('modalTitle').innerText = c.title;
            document.getElementById('modalTranscript').innerHTML = c.messages.map(m => `
                <div class="${m.role === 'user' ? 'chat-user' : 'chat-assistant'} p-4 max-w-[92%] text-sm">
                    <p class="font-black text-[8px] uppercase tracking-widest opacity-40 mb-2">${m.role}</p>
                    <div class="whitespace-pre-wrap leading-relaxed">${m.text}</div>
                </div>
            `).join('');
            
            const starBtn = document.getElementById('modalStarBtn');
            starBtn.innerHTML = `<i data-lucide="star" class="w-6 h-6 ${starredIds.has(id) ? 'fill-yellow-500 text-yellow-500' : 'text-gray-500'}"></i>`;
            starBtn.onclick = () => { toggleStar(id); viewDetail(id); };

            document.getElementById('detailModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function toggleExportMenu() { document.getElementById('exportMenu').classList.toggle('hidden'); }

        function exportAs(format) {
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            let data = currentView === 'collections' ? allChats.filter(c => starredIds.has(c.id)) : allChats;
            if (searchVal) data = data.filter(c => c.title.toLowerCase().includes(searchVal) || c.messages.some(m => m.text.toLowerCase().includes(searchVal)));

            let content = "", mime = "text/plain", ext = "txt";
            if (format === 'json') { content = JSON.stringify(data, null, 2); mime = "application/json"; ext = "json"; }
            else { data.forEach(c => { content += `\n--- ${c.title} (${c.date}) ---\n\n`; c.messages.forEach(m => { content += `${m.role.toUpperCase()}: ${m.text}\n\n`; }); }); if (format === 'md') ext = "md"; }

            const blob = new Blob([content], { type: mime });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Keeper_Export_${new Date().getTime()}.${ext}`;
            a.click();
            toggleExportMenu();
        }

        function setView(v) { 
            currentView = v; 
            document.getElementById('exportMenu').classList.add('hidden');
            updateUI(); 
        }
        
        function updateUI() { 
            const searchInput = document.getElementById('searchInput');
            const searchVal = searchInput ? searchInput.value.toLowerCase() : "";
            let filtered = currentView === 'collections' ? allChats.filter(c => starredIds.has(c.id)) : allChats;
            if (searchVal) filtered = filtered.filter(c => c.title.toLowerCase().includes(searchVal) || c.messages.some(m => m.text.toLowerCase().includes(searchVal)));

            renderGrid(filtered);
            
            // Highlight nav
            ['nav-library', 'nav-collections'].forEach(id => {
                const btn = document.getElementById(id);
                btn.classList.replace('text-violet-500', 'text-gray-500');
            });
            document.getElementById(`nav-${currentView}`).classList.replace('text-gray-500', 'text-violet-500');
        }

        function reviveConversation() {
            const c = allChats.find(x => x.id === activeChatId);
            if (!c) return;
            const fullText = c.messages.map(m => `${m.role.toUpperCase()}: ${m.text}`).join('\n\n');
            const el = document.createElement('textarea');
            el.value = fullText;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("Copied to Clipboard");
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function resetLicense() { localStorage.clear(); location.reload(); }
        function showToast(m) { 
            const t = document.getElementById('toast'); 
            t.innerText = m; 
            t.classList.replace('opacity-0', 'opacity-100'); 
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2000); 
        }
        
        window.onload = () => { 
            if (localStorage.getItem('ck_v3_key')) activateKey(); 
            lucide.createIcons(); 
        };
    </script>
</body>
</html>
