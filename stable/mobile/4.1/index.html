<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Keeper Pro v3.2</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        :root { --accent: #8b5cf6; --accent-hover: #7c3aed; }
        body { font-family: 'Inter', sans-serif; background: #0b0f1a; color: #e5e7eb; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'Fira Code', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        
        .chat-user { background: #1e293b; border-radius: 1.25rem 1.25rem 0.25rem 1.25rem; border: 1px solid #334155; }
        .chat-assistant { background: #064e3b; border-radius: 1.25rem 1.25rem 1.25rem 0.25rem; border: 1px solid #065f46; }
        
        .nav-drawer { transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-drawer.open { transform: translateX(0); }
        
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }

        /* Loading Spinner */
        .spinner { border: 3px solid rgba(139, 92, 246, 0.1); border-top: 3px solid #8b5cf6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-hidden selection:bg-violet-500/30">

    <!-- NAVIGATION DRAWER -->
    <div id="navOverlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/60 z-[100] hidden backdrop-blur-sm transition-opacity"></div>
    <aside id="navDrawer" class="nav-drawer fixed top-0 left-0 h-full w-72 bg-[#0b0f1a] border-r border-gray-800 z-[101] p-6 flex flex-col gap-6 shadow-2xl">
        <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-3">
                <div class="bg-violet-600 p-1.5 rounded-lg"><i data-lucide="database" class="w-5 h-5 text-white"></i></div>
                <h1 class="text-lg font-bold">Menu</h1>
            </div>
            <button onclick="toggleMenu()" class="p-2 hover:bg-gray-800 rounded-xl transition text-gray-500"><i data-lucide="x" class="w-5"></i></button>
        </div>

        <nav class="space-y-2">
            <button onclick="setView('library')" id="nav-library" class="w-full flex items-center justify-between px-4 py-3 rounded-2xl transition-all group hover:bg-violet-600/10">
                <div class="flex items-center gap-4">
                    <i data-lucide="layers" class="w-5 text-gray-400 group-hover:text-violet-400"></i>
                    <span class="font-semibold">Full Library</span>
                </div>
                <span id="count-library" class="text-[10px] mono text-gray-500">0</span>
            </button>
            <button onclick="setView('collections')" id="nav-collections" class="w-full flex items-center justify-between px-4 py-3 rounded-2xl transition-all group hover:bg-violet-600/10">
                <div class="flex items-center gap-4">
                    <i data-lucide="star" class="w-5 text-yellow-500/80 group-hover:text-yellow-400"></i>
                    <span class="font-semibold">Starred</span>
                </div>
                <span id="count-starred" class="text-[10px] mono text-gray-500">0</span>
            </button>
            <button onclick="setView('timeline')" id="nav-timeline" class="w-full flex items-center px-4 py-3 rounded-2xl transition-all group hover:bg-violet-600/10">
                <div class="flex items-center gap-4">
                    <i data-lucide="calendar" class="w-5 text-gray-400 group-hover:text-violet-400"></i>
                    <span class="font-semibold">Timeline</span>
                </div>
            </button>
        </nav>

        <div class="mt-auto border-t border-gray-800 pt-6">
            <button onclick="resetLicense()" class="w-full flex items-center gap-4 px-4 py-3 text-red-500 hover:bg-red-500/10 rounded-2xl transition font-semibold">
                <i data-lucide="log-out" class="w-5"></i> Close Vault
            </button>
        </div>
    </aside>

    <!-- LOCK SCREEN -->
    <div id="lock-screen" class="fixed inset-0 bg-[#0b0f1a] flex items-center justify-center p-6 z-[9999] text-center">
        <div class="max-w-md w-full space-y-8 animate-in">
            <div class="bg-violet-500/10 w-24 h-24 rounded-3xl flex items-center justify-center mx-auto border border-violet-500/30 rotate-3">
                <i data-lucide="shield-check" class="w-12 h-12 text-violet-500"></i>
            </div>
            <div>
                <h1 class="text-4xl font-black text-white mb-3 tracking-tight">Vault Locked</h1>
                <p class="text-gray-400 text-lg">Enter master key <span class="text-violet-400 font-bold">222</span></p>
            </div>
            <div class="space-y-4">
                <input type="text" id="keyInput" placeholder="CK-XXXX" class="w-full bg-gray-900 border border-gray-800 rounded-2xl px-6 py-4 text-center text-2xl font-mono focus:border-violet-500 outline-none transition">
                <button onclick="activateKey()" class="w-full bg-violet-600 hover:bg-violet-700 py-4 rounded-2xl font-bold text-lg shadow-lg transition-all active:scale-95">Unlock v3.2</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-content" class="flex flex-col h-screen overflow-hidden hidden">
        <header class="h-16 border-b border-gray-800/60 px-4 md:px-6 flex justify-between items-center bg-[#0b0f1a]/90 backdrop-blur-md sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <button onclick="toggleMenu()" class="p-2 hover:bg-gray-800 rounded-xl transition text-gray-400 group">
                    <i data-lucide="menu" class="w-6 group-active:scale-90 transition"></i>
                </button>
                <h1 id="viewTitle" class="text-lg font-bold tracking-tight ml-1">Library</h1>
            </div>
            <div class="flex gap-2 items-center">
                <input type="file" id="fileInput" class="hidden" accept=".json">
                <button onclick="document.getElementById('fileInput').click()" id="importBtn" class="bg-violet-600 hover:bg-violet-700 p-2.5 rounded-xl transition shadow-lg shadow-violet-900/20 active:scale-90 flex items-center gap-2" title="Import JSON">
                    <span id="importText" class="hidden md:inline text-sm font-bold ml-1 text-white pr-1">Import Archive</span>
                    <i data-lucide="plus" class="w-5 text-white"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col min-w-0 bg-[#0d121f] overflow-hidden">
            <!-- Search & Filter Bar -->
            <div class="p-4 border-b border-gray-800/60 flex items-center gap-3 bg-[#0b0f1a]/40">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-4 top-3.5 w-4 text-gray-500"></i>
                    <input type="text" id="searchInput" placeholder="Search title or content..." 
                        class="w-full bg-gray-900/80 border border-gray-800 rounded-2xl py-3 pl-11 pr-4 focus:outline-none focus:border-violet-500 transition shadow-inner text-sm">
                </div>
                <div class="relative">
                    <button onclick="toggleExportMenu()" class="bg-gray-900 hover:bg-gray-800 p-3 rounded-xl border border-gray-800 group transition">
                        <i data-lucide="download" class="w-5 text-violet-400"></i>
                    </button>
                    <div id="exportMenu" class="hidden absolute right-0 top-full mt-2 w-56 bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl overflow-hidden z-[100] animate-in">
                        <div class="px-4 py-2 bg-gray-800/50 text-[10px] font-bold text-gray-500 uppercase tracking-widest border-b border-gray-800">Export Options</div>
                        <button onclick="exportAs('json')" class="w-full text-left px-4 py-3 text-xs hover:bg-violet-600/20 flex items-center gap-3 border-b border-gray-800/50 transition"><i data-lucide="file-json" class="w-3"></i> Archive (JSON)</button>
                        <button onclick="exportAs('txt')" class="w-full text-left px-4 py-3 text-xs hover:bg-violet-600/20 flex items-center gap-3 border-b border-gray-800/50 transition"><i data-lucide="file-text" class="w-3"></i> Readable (TXT)</button>
                        <button onclick="exportAs('md')" class="w-full text-left px-4 py-3 text-xs hover:bg-violet-600/20 flex items-center gap-3 transition"><i data-lucide="book-open" class="w-3"></i> NotebookLM (MD)</button>
                    </div>
                </div>
            </div>

            <div id="contentArea" class="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar bg-[#0d121f]">
                <div id="chatGrid" class="grid-view"></div>
            </div>
        </main>
    </div>

    <!-- DETAIL MODAL -->
    <div id="detailModal" class="fixed inset-0 bg-black/95 z-[200] hidden flex items-center justify-center backdrop-blur-md">
        <div class="bg-[#0b0f1a] w-full h-full md:w-[95%] md:h-[95%] md:rounded-3xl flex flex-col overflow-hidden shadow-2xl animate-in">
            <header class="h-16 border-b border-gray-800 flex justify-between items-center bg-gray-900/50 px-4 md:px-6">
                <h2 id="modalTitle" class="font-bold truncate text-base md:text-xl pr-4">Conversation</h2>
                <div class="flex items-center gap-1 md:gap-3">
                    <button onclick="copyFullChat()" class="p-2.5 text-violet-400 hover:bg-violet-500/10 rounded-xl transition" title="Copy Context"><i data-lucide="copy" class="w-5"></i></button>
                    <button id="modalStarBtn" class="p-2.5 hover:bg-gray-800 rounded-xl transition"><i data-lucide="star" class="w-4"></i></button>
                    <button onclick="closeModal()" class="p-2.5 text-gray-500 hover:text-red-500 transition"><i data-lucide="x" class="w-6"></i></button>
                </div>
            </header>
            <div id="modalTranscript" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col gap-6 custom-scrollbar bg-gray-900/20"></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 bg-violet-600 text-white rounded-2xl shadow-2xl transition-all opacity-0 translate-y-10 z-[300] pointer-events-none font-medium text-sm flex items-center gap-3">
        <div id="toastSpinner" class="hidden spinner"></div>
        <span id="toastMsg">Ready</span>
    </div>

    <script>
        let db, allChats = [], starredIds = new Set(), activeChatId = null, currentView = 'library', isMenuOpen = false;

        const initDB = () => new Promise((resolve, reject) => {
            const req = indexedDB.open("ChatKeeperV3", 1);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                if (!d.objectStoreNames.contains("archive")) d.createObjectStore("archive", { keyPath: "id" });
                if (!d.objectStoreNames.contains("meta")) d.createObjectStore("meta", { keyPath: "id" });
            };
            req.onsuccess = e => { db = e.target.result; resolve(); };
            req.onerror = e => reject(e);
        });

        async function loadData() {
            if (!db) return;
            const tx = db.transaction(["archive", "meta"], "readonly");
            const archiveStore = tx.objectStore("archive");
            const metaStore = tx.objectStore("meta");

            const chats = await new Promise(r => { const req = archiveStore.getAll(); req.onsuccess = () => r(req.result); });
            const metas = await new Promise(r => { const req = metaStore.getAll(); req.onsuccess = () => r(req.result); });
            
            allChats = chats;
            starredIds = new Set(metas.filter(m => m.starred).map(m => m.id));
            updateUI();
        }

        async function activateKey() {
            if (document.getElementById('keyInput').value.trim() === '222') {
                localStorage.setItem('ck_v3_key', '222');
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                await initDB(); 
                await loadData();
            }
        }

        function toggleMenu() {
            isMenuOpen = !isMenuOpen;
            const drawer = document.getElementById('navDrawer');
            const overlay = document.getElementById('navOverlay');
            if (isMenuOpen) {
                drawer.classList.add('open');
                overlay.classList.remove('hidden');
            } else {
                drawer.classList.remove('open');
                overlay.classList.add('hidden');
            }
        }

        function setView(v) {
            currentView = v;
            document.getElementById('viewTitle').innerText = v === 'collections' ? 'Starred' : v.charAt(0).toUpperCase() + v.slice(1);
            if (isMenuOpen) toggleMenu();
            updateUI();
        }

        document.getElementById('fileInput').onchange = async e => {
            const file = e.target.files[0];
            if (!file) return;

            showToast("Opening large file...", true);
            const reader = new FileReader();
            
            reader.onload = async (event) => {
                try {
                    showToast("Parsing JSON structure...", true);
                    const raw = JSON.parse(event.target.result);
                    
                    showToast(`Formatting ${raw.length} conversations...`, true);
                    const processed = raw.map(c => ({
                        id: c.id, 
                        title: c.title || "Untitled Conversation", 
                        date: new Date(c.create_time * 1000).toLocaleDateString(),
                        rawDate: c.create_time,
                        messages: Object.values(c.mapping || {}).filter(m => m.message?.content?.parts).map(m => ({
                            role: m.message.author.role, 
                            text: m.message.content.parts.join('\n')
                        }))
                    })).filter(c => c.messages.length > 0);

                    showToast(`Saving to local database...`, true);
                    
                    // Use a single transaction for all writes for speed and reliability
                    const tx = db.transaction("archive", "readwrite");
                    const store = tx.objectStore("archive");
                    
                    for (const chat of processed) {
                        store.put(chat);
                    }

                    tx.oncomplete = () => {
                        showToast(`Successfully imported ${processed.length} conversations!`);
                        loadData();
                    };

                    tx.onerror = () => {
                        showToast("Database error during import", false);
                        console.error("DB Error", tx.error);
                    };

                } catch (err) {
                    console.error(err);
                    showToast("Import failed: Invalid JSON file", false);
                }
            };

            reader.readAsText(file);
        };

        function updateUI() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = [...allChats];
            
            if (currentView === 'collections') filtered = filtered.filter(c => starredIds.has(c.id));
            
            if (query) {
                filtered = filtered.filter(c => 
                    c.title.toLowerCase().includes(query) || 
                    c.messages.some(m => m.text.toLowerCase().includes(query))
                );
            }

            document.getElementById('count-library').innerText = allChats.length;
            document.getElementById('count-starred').innerText = starredIds.size;

            if (currentView === 'timeline') {
                renderTimeline(filtered);
            } else {
                renderGrid(filtered);
            }
        }

        function renderGrid(chats) {
            const grid = document.getElementById('chatGrid');
            if (chats.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-gray-600"><p>No conversations found.</p></div>`;
                return;
            }
            grid.innerHTML = chats.map(c => `
                <div class="bg-gray-900/40 border ${starredIds.has(c.id) ? 'border-yellow-500/30 shadow-[0_0_15px_rgba(234,179,8,0.05)]' : 'border-gray-800'} rounded-2xl p-5 hover:border-violet-500/50 hover:bg-gray-800/40 transition-all flex flex-col group animate-in relative">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[9px] font-black tracking-widest uppercase text-violet-400 bg-violet-400/5 px-2 py-1 rounded-md border border-violet-500/10">
                            ${c.messages.length} MSGS
                        </span>
                        <button onclick="event.stopPropagation(); toggleStar('${c.id}')" class="p-2 -m-2 hover:scale-110 transition active:scale-90">
                            <i data-lucide="star" class="w-4 ${starredIds.has(c.id) ? 'fill-yellow-500 text-yellow-500' : 'text-gray-700'}"></i>
                        </button>
                    </div>
                    <h3 class="font-bold text-base mb-2 truncate text-white">${c.title}</h3>
                    <p class="text-xs text-gray-500 line-clamp-2 italic opacity-70 mb-4">"${c.messages[0]?.text.slice(0, 70)}..."</p>
                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-800/50">
                        <span class="text-[10px] text-gray-600 font-medium mono">${c.date}</span>
                        <button onclick="viewDetail('${c.id}')" class="text-xs text-violet-400 font-bold hover:text-violet-200 flex items-center gap-1 active:scale-95 transition">
                            Explore <i data-lucide="chevron-right" class="w-3"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderTimeline(chats) {
            const grid = document.getElementById('chatGrid');
            if (chats.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-gray-600"><p>No history found.</p></div>`;
                return;
            }

            const sorted = chats.sort((a, b) => b.rawDate - a.rawDate);
            const groups = {};
            sorted.forEach(c => {
                const d = new Date(c.rawDate * 1000);
                const key = d.toLocaleString('default', { month: 'long', year: 'numeric' });
                if (!groups[key]) groups[key] = [];
                groups[key].push(c);
            });

            grid.innerHTML = Object.entries(groups).map(([month, items]) => `
                <div class="col-span-full mb-8">
                    <div class="flex items-center gap-4 mb-4">
                        <h2 class="text-sm font-black text-gray-400 uppercase tracking-widest">${month}</h2>
                        <div class="h-px flex-1 bg-gray-800"></div>
                        <span class="text-[10px] text-gray-600 mono">${items.length} CHATS</span>
                    </div>
                    <div class="space-y-3">
                        ${items.map(c => `
                            <div onclick="viewDetail('${c.id}')" class="bg-gray-900/30 border border-gray-800 p-4 rounded-2xl flex items-center justify-between hover:bg-gray-800/40 active:scale-[0.98] transition cursor-pointer">
                                <div class="min-w-0 pr-4">
                                    <h4 class="font-bold text-sm text-gray-200 truncate">${c.title}</h4>
                                    <p class="text-[10px] text-gray-600 mono">${c.date}</p>
                                </div>
                                <i data-lucide="chevron-right" class="w-4 text-gray-700"></i>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function toggleStar(id) {
            const tx = db.transaction("meta", "readwrite");
            const store = tx.objectStore("meta");
            const starred = !starredIds.has(id);
            if (starred) starredIds.add(id); else starredIds.delete(id);
            await store.put({ id, starred });
            updateUI();
        }

        function viewDetail(id) {
            activeChatId = id;
            const c = allChats.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = c.title;
            document.getElementById('modalTranscript').innerHTML = c.messages.map(m => `
                <div class="flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'}">
                    <div class="max-w-[90%] p-4 md:p-5 ${m.role === 'user' ? 'chat-user' : 'chat-assistant'}">
                        <p class="text-[9px] font-black uppercase tracking-widest opacity-40 mb-2">${m.role}</p>
                        <div class="text-[14px] leading-relaxed whitespace-pre-wrap">${m.text}</div>
                    </div>
                </div>
            `).join('');
            
            const starBtn = document.getElementById('modalStarBtn');
            starBtn.innerHTML = `<i data-lucide="star" class="w-5 ${starredIds.has(id) ? 'fill-yellow-500 text-yellow-500' : ''}"></i>`;
            starBtn.onclick = () => { toggleStar(id); viewDetail(id); };

            document.getElementById('detailModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function toggleExportMenu() { document.getElementById('exportMenu').classList.toggle('hidden'); }

        function exportAs(format) {
            const data = allChats.filter(c => currentView !== 'collections' || starredIds.has(c.id));
            let content = "", mime = "text/plain", ext = "txt";
            if (format === 'json') { content = JSON.stringify(data, null, 2); mime = "application/json"; ext = "json"; }
            else {
                data.forEach(c => {
                    content += `\n# ${c.title.toUpperCase()} (${c.date})\n\n`;
                    c.messages.forEach(m => { content += `**${m.role.toUpperCase()}**: ${m.text}\n\n`; });
                    content += `---\n`;
                });
                if (format === 'md') ext = "md";
            }
            const blob = new Blob([content], { type: mime });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `ChatKeeper_Export_${new Date().toISOString().slice(0,10)}.${ext}`;
            a.click();
            toggleExportMenu();
            showToast(`Exported ${data.length} chats`);
        }

        function copyFullChat() {
            const chat = allChats.find(c => c.id === activeChatId);
            const text = chat.messages.map(m => `${m.role.toUpperCase()}: ${m.text}`).join('\n\n');
            const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            showToast("Conversation copied!");
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function resetLicense() { localStorage.clear(); location.reload(); }
        
        function showToast(m, loading = false) { 
            const t = document.getElementById('toast'); 
            const spinner = document.getElementById('toastSpinner');
            const msg = document.getElementById('toastMsg');
            
            msg.innerText = m;
            if (loading) spinner.classList.remove('hidden'); else spinner.classList.add('hidden');
            
            t.classList.replace('opacity-0', 'opacity-100'); 
            t.classList.replace('translate-y-10', 'translate-y-0'); 
            
            if (!loading) {
                setTimeout(() => { 
                    t.classList.replace('opacity-100', 'opacity-0'); 
                    t.classList.replace('translate-y-0', 'translate-y-10'); 
                }, 3000); 
            }
        }
        
        document.getElementById('searchInput').addEventListener('input', updateUI);
        window.onload = () => { if (localStorage.getItem('ck_v3_key')) activateKey(); lucide.createIcons(); };
    </script>
</body>
</html>
