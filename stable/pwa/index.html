        import React, { useState, useEffect, useMemo, useRef, useCallback } from 'https://esm.sh/react@18.2.0';

        /**
         * UTILS: License
         */
        const LICENSE_STORAGE_KEY = 'chatkeeper_license_v2';
        const DEVICE_ID_KEY = 'chatkeeper_device_id';

        function getDeviceId() {
            let id = localStorage.getItem(DEVICE_ID_KEY);
            if (!id) {
                id = 'ck-' + Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
                localStorage.setItem(DEVICE_ID_KEY, id);
            }
            return id;
        }

        async function activateLicense(key) {
            // Simulation for standalone version
            if (key === 'CK-FREE-2026' || key.length > 10) {
                const token = {
                    key,
                    deviceId: getDeviceId(),
                    activatedAt: Date.now(),
                    expiresAt: Date.now() + (1000 * 60 * 60 * 24 * 365)
                };
                localStorage.setItem(LICENSE_STORAGE_KEY, JSON.stringify(token));
                return { success: true };
            }
            return { success: false, error: 'Invalid license key. Use CK-FREE-2026 for testing.' };
        }

        function checkLicense() {
            const stored = localStorage.getItem(LICENSE_STORAGE_KEY);
            if (!stored) return false;
            try {
                const token = JSON.parse(stored);
                if (token.deviceId !== getDeviceId()) return false;
                if (token.expiresAt < Date.now()) return false;
                return true;
            } catch (e) {
                return false;
            }
        }

        function deactivateLicense() {
            localStorage.removeItem(LICENSE_STORAGE_KEY);
        }

        /**
         * UTILS: Parser
         */
        function parseConversation(raw) {
            const messages = [];
            const mapping = raw.mapping || {};
            
            // Find root or start from current_node
            let currentNodeId = raw.current_node;
            const path = [];
            
            while (currentNodeId && mapping[currentNodeId]) {
                const node = mapping[currentNodeId];
                if (node.message) {
                    path.unshift(node);
                }
                currentNodeId = node.parent;
            }

            path.forEach(node => {
                const msg = node.message;
                if (!msg || !msg.content || !msg.content.parts) return;
                
                const content = msg.content.parts.join('\n');
                if (!content.trim()) return;

                messages.push({
                    id: msg.id,
                    role: msg.author.role === 'assistant' ? 'assistant' : 'user',
                    content: content,
                    timestamp: msg.create_time,
                    model: msg.metadata?.model_slug,
                    feedback: msg.metadata?.user_context_message_data?.user_feedback?.type
                });
            });

            const analysis = runHeuristicAnalysis(messages);

            return {
                id: raw.id || Math.random().toString(36).substr(2, 9),
                title: raw.title || 'Untitled Conversation',
                createdAt: raw.create_time * 1000,
                updatedAt: raw.update_time * 1000,
                messages,
                tags: generateTags(analysis),
                analysis,
                isStarred: false,
                isHidden: false
            };
        }

        function runHeuristicAnalysis(messages) {
            const fullText = messages.map(m => m.content).join(' ');
            const userText = messages.filter(m => m.role === 'user').map(m => m.content).join(' ');
            const assistantText = messages.filter(m => m.role === 'assistant').map(m => m.content).join(' ');

            const wordCount = fullText.split(/\s+/).length;
            const codeBlockCount = (fullText.match(/```/g) || []).length / 2;
            
            // Sentiment (Crude)
            const posWords = ['good', 'great', 'awesome', 'thanks', 'thank', 'perfect', 'help', 'useful', 'yes', 'correct'];
            const negWords = ['bad', 'wrong', 'error', 'fail', 'no', 'incorrect', 'issue', 'bug', 'slow', 'stupid'];
            
            let posScore = 0;
            let negScore = 0;
            
            fullText.toLowerCase().split(/\W+/).forEach(w => {
                if (posWords.includes(w)) posScore++;
                if (negWords.includes(w)) negScore++;
            });

            const sentiment = posScore > negScore ? 'Positive' : negScore > posScore ? 'Negative' : 'Neutral';

            // Topic (Crude)
            const topics = {
                'Coding': ['code', 'function', 'variable', 'api', 'react', 'python', 'javascript', 'error', 'debug'],
                'Creative': ['story', 'poem', 'write', 'creative', 'novel', 'character', 'plot'],
                'Business': ['marketing', 'strategy', 'business', 'plan', 'revenue', 'customer', 'product'],
                'Learning': ['explain', 'learn', 'what is', 'how to', 'concept', 'history', 'science']
            };

            let topTopic = 'General';
            let maxHits = 0;
            Object.entries(topics).forEach(([topic, keywords]) => {
                let hits = 0;
                fullText.toLowerCase().split(/\W+/).forEach(w => {
                    if (keywords.includes(w)) hits++;
                });
                if (hits > maxHits) {
                    maxHits = hits;
                    topTopic = topic;
                }
            });

            // Importance Score
            const importanceScore = Math.min(100, Math.floor((wordCount / 100) + (codeBlockCount * 10) + (posScore * 2)));

            return {
                sentiment,
                topic: topTopic,
                wordCount,
                codeBlockCount,
                importanceScore,
                hasLikes: messages.some(m => m.feedback === 'thumbsUp'),
                hasDislikes: messages.some(m => m.feedback === 'thumbsDown'),
                promptType: messages.length > 10 ? 'Deep Dive' : 'Quick Query',
                wordFreq: getWordFreq(fullText),
                userWordFreq: getWordFreq(userText),
                assistantWordFreq: getWordFreq(assistantText)
            };
        }

        function getWordFreq(text) {
            const freq = {};
            const stopWords = ['the', 'a', 'an', 'and', 'or', 'but', 'is', 'are', 'was', 'were', 'to', 'of', 'in', 'on', 'at', 'by', 'for', 'with', 'about', 'as', 'it', 'its', 'they', 'them', 'their', 'this', 'that', 'these', 'those', 'i', 'me', 'my', 'we', 'us', 'our', 'you', 'your', 'he', 'him', 'his', 'she', 'her', 'has', 'have', 'had', 'do', 'does', 'did', 'be', 'been', 'being'];
            
            text.toLowerCase().split(/\W+/).forEach(w => {
                if (w.length > 2 && !stopWords.includes(w)) {
                    freq[w] = (freq[w] || 0) + 1;
                }
            });
            return freq;
        }

        function generateTags(analysis) {
            return [
                `Topic: ${analysis.topic}`,
                `Sentiment: ${analysis.sentiment}`,
                `Type: ${analysis.promptType}`,
                `Length: ${analysis.wordCount > 1000 ? 'Long' : 'Short'}`,
                analysis.hasLikes ? 'Feedback: Liked' : null,
                analysis.codeBlockCount > 0 ? 'Feature: Code' : null
            ].filter(Boolean);
        }

        function getSnippet(text, term) {
            if (!term) return text.substring(0, 200) + '...';
            const index = text.toLowerCase().indexOf(term.toLowerCase());
            if (index === -1) return text.substring(0, 200) + '...';
            
            const start = Math.max(0, index - 100);
            const end = Math.min(text.length, index + 100);
            return (start > 0 ? '...' : '') + text.substring(start, end) + (end < text.length ? '...' : '');
        }

        function fuzzySearchText(text, term) {
            const t = term.toLowerCase();
            const content = text.toLowerCase();
            if (content.includes(t)) return true;
            
            // Simple fuzzy: allow 1 char difference if term > 4
            if (t.length <= 4) return false;
            
            for (let i = 0; i < t.length; i++) {
                const variant = t.substring(0, i) + t.substring(i + 1);
                if (content.includes(variant)) return true;
            }
            return false;
        }

        function exportMultipleToText(convs) {
            return convs.map(c => {
                let text = `TITLE: ${c.title}\n`;
                text += `DATE: ${new Date(c.createdAt).toLocaleString()}\n`;
                text += `TAGS: ${c.tags.join(', ')}\n`;
                text += `IMPORTANCE: ${c.analysis.importanceScore}\n`;
                text += `\n${'='.repeat(50)}\n\n`;
                
                c.messages.forEach(m => {
                    text += `[${m.role.toUpperCase()}] (${m.model || 'unknown'})\n`;
                    text += `${m.content}\n\n`;
                    text += `${'-'.repeat(30)}\n\n`;
                });
                
                return text;
            }).join(`\n\n${'#'.repeat(80)}\n\n`);
        }

        function exportToJSONL(conversations) {
            return conversations.map(c => {
                const doc = {
                    id: c.id,
                    text: exportMultipleToText([c]),
                    metadata: {
                        title: c.title,
                        date: new Date(c.createdAt).toISOString(),
                        topic: c.analysis.topic,
                        tags: c.tags,
                        score: c.analysis.importanceScore,
                        has_likes: c.analysis.hasLikes,
                        has_dislikes: c.analysis.hasDislikes
                    }
                };
                return JSON.stringify(doc);
            }).join('\n');
        }

        function exportPrompts(conversations) {
            const prompts = conversations.map(c => {
                const firstUserMsg = c.messages.find(m => m.role === 'user');
                return {
                    title: c.title,
                    prompt: firstUserMsg ? firstUserMsg.content : "No prompt found",
                    tags: c.tags
                };
            });
            return JSON.stringify(prompts, null, 2);
        }

        /**
         * COMPONENTS: HyperlinkedText
         */
        const HyperlinkedText = ({ content, onSearch }) => {
            const tokens = useMemo(() => content.split(/(\s+)/), [content]);
            return React.createElement('span', { className: 'break-words' },
                tokens.map((token, index) => {
                    if (/^\s+$/.test(token)) return React.createElement('span', { key: index }, token);
                    const match = token.match(/^([^\w]*)([\w'-]+)([^\w]*)$/);
                    if (!match) return React.createElement('span', { key: index }, token);
                    const [full, prefix, word, suffix] = match;
                    return React.createElement('span', { key: index },
                        prefix,
                        React.createElement('span', {
                            onClick: (e) => { e.stopPropagation(); onSearch(word); },
                            className: 'cursor-pointer hover:text-indigo-600 hover:bg-indigo-50 hover:underline decoration-indigo-300 underline-offset-2 transition-colors rounded-sm px-0.5 -mx-0.5',
                            title: `Search for "${word}"`
                        }, word),
                        suffix
                    );
                })
            );
        };

        /**
         * COMPONENTS: GlobalSearchBar
         */
        const GlobalSearchBar = ({ config, onChange, isTutorialMode, onToggleMenu }) => {
            const [isPopupOpen, setIsPopupOpen] = useState(false);
            const update = (updates) => onChange({ ...config, ...updates });

            return React.createElement('div', { className: 'bg-white border-b border-slate-200 p-2 md:p-4 sticky top-0 z-30 shadow-sm flex items-center justify-center' },
                React.createElement('div', { className: 'max-w-3xl w-full relative flex items-center gap-2' },
                    React.createElement('button', {
                        onClick: onToggleMenu,
                        className: 'md:hidden p-2.5 rounded-xl border border-slate-200 text-slate-600 bg-white hover:bg-slate-50 transition-colors'
                    }, React.createElement(Lucide.Menu, { className: 'w-5 h-5' })),
                    React.createElement('div', { className: 'relative flex-1' },
                        React.createElement(Lucide.Search, { className: 'absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400' }),
                        React.createElement('input', {
                            type: 'text',
                            placeholder: 'Search...',
                            className: 'w-full pl-12 pr-4 py-2.5 bg-slate-100 border-transparent focus:bg-white border focus:border-indigo-500 focus:ring-0 rounded-xl text-sm transition-all shadow-sm truncate',
                            value: config.term,
                            onChange: (e) => update({ term: e.target.value })
                        })
                    ),
                    React.createElement('div', { className: 'relative' },
                        React.createElement('button', {
                            onClick: () => setIsPopupOpen(!isPopupOpen),
                            className: cn('p-2.5 rounded-xl border transition-colors', isPopupOpen ? 'bg-indigo-50 border-indigo-200 text-indigo-600' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50')
                        }, React.createElement(Lucide.Sliders, { className: 'w-5 h-5' })),
                        isPopupOpen && React.createElement('div', { className: 'absolute top-full right-0 mt-2 w-80 max-w-[calc(100vw-2rem)] bg-white rounded-xl shadow-2xl border border-slate-200 p-4 z-50 animate-in slide-in-from-top-2' },
                            React.createElement('div', { className: 'flex justify-between items-center mb-4 border-b border-slate-100 pb-2' },
                                React.createElement('h3', { className: 'font-bold text-slate-800 text-sm' }, 'Search Settings'),
                                React.createElement('button', { onClick: () => setIsPopupOpen(false), className: 'text-slate-400 hover:text-slate-600' }, React.createElement(Lucide.X, { className: 'w-4 h-4' }))
                            ),
                            React.createElement('div', { className: 'space-y-4' },
                                React.createElement('div', { className: 'space-y-2' },
                                    React.createElement('button', {
                                        onClick: () => update({ includeHidden: !config.includeHidden }),
                                        className: 'flex items-center justify-between w-full p-2 hover:bg-slate-50 rounded-lg transition-colors'
                                    },
                                        React.createElement('div', { className: 'flex items-center gap-2 text-sm text-slate-700' },
                                            config.includeHidden ? React.createElement(Lucide.Eye, { className: 'w-4 h-4 text-indigo-500' }) : React.createElement(Lucide.EyeOff, { className: 'w-4 h-4 text-slate-400' }),
                                            React.createElement('span', null, 'Include Hidden')
                                        ),
                                        config.includeHidden ? React.createElement(Lucide.ToggleRight, { className: 'w-6 h-6 text-indigo-600' }) : React.createElement(Lucide.ToggleLeft, { className: 'w-6 h-6 text-slate-300' })
                                    ),
                                    React.createElement('button', {
                                        onClick: () => update({ isFuzzy: !config.isFuzzy }),
                                        className: 'flex items-center justify-between w-full p-2 hover:bg-slate-50 rounded-lg transition-colors'
                                    },
                                        React.createElement('div', { className: 'flex items-center gap-2 text-sm text-slate-700' },
                                            React.createElement('span', { className: 'font-mono bg-slate-100 px-1 rounded text-xs text-slate-500' }, '~'),
                                            React.createElement('span', null, 'Fuzzy Matching')
                                        ),
                                        config.isFuzzy ? React.createElement(Lucide.ToggleRight, { className: 'w-6 h-6 text-indigo-600' }) : React.createElement(Lucide.ToggleLeft, { className: 'w-6 h-6 text-slate-300' })
                                    )
                                ),
                                React.createElement('div', null,
                                    React.createElement('label', { className: 'text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block' }, 'Sort Results'),
                                    React.createElement('select', {
                                        className: 'w-full bg-slate-50 border border-slate-200 text-sm rounded-lg py-2 px-3 text-slate-700',
                                        value: config.sortOrder,
                                        onChange: (e) => update({ sortOrder: e.target.value })
                                    },
                                        React.createElement('option', { value: 'newest' }, 'Newest First'),
                                        React.createElement('option', { value: 'oldest' }, 'Oldest First'),
                                        React.createElement('option', { value: 'relevance' }, 'Relevance')
                                    )
                                )
                            )
                        )
                    )
                )
            );
        };

        /**
         * VIEWS: SearchView
         */
        const SearchView = ({ conversations, onSelect, config, onToggleStar, onToggleHidden }) => {
            const [expandedResults, setExpandedResults] = useState(new Set());

            const parsedQuery = useMemo(() => {
                const groups = config.term.split('|');
                const orGroups = groups.map(groupStr => {
                    const mustContain = [];
                    const exactPhrases = [];
                    const mustExclude = [];
                    const regex = /"([^"]+)"|(-[^\s]+)|([^\s]+)/g;
                    let match;
                    while ((match = regex.exec(groupStr)) !== null) {
                        if (match[1]) exactPhrases.push(match[1].toLowerCase());
                        else if (match[2]) mustExclude.push(match[2].substring(1).toLowerCase());
                        else if (match[3]) mustContain.push(match[3].toLowerCase());
                    }
                    return { mustContain, exactPhrases, mustExclude };
                });
                return { orGroups };
            }, [config.term]);

            const results = useMemo(() => {
                if (!config.term || config.term.trim().length < 2) return [];
                const hits = [];

                conversations.forEach(conv => {
                    if (conv.isHidden && !config.includeHidden) return;
                    const tagsString = (conv.tags || []).join(' ').toLowerCase();
                    const titleLower = conv.title.toLowerCase();
                    const hasLikes = conv.analysis?.hasLikes;
                    const hasDislikes = conv.analysis?.hasDislikes;

                    const metaMatchesGroup = parsedQuery.orGroups.some(group => {
                        const hasExcluded = group.mustExclude.some(ex => titleLower.includes(ex) || tagsString.includes(ex));
                        if (hasExcluded) return false;
                        const hasAllPhrases = group.exactPhrases.every(ph => titleLower.includes(ph) || tagsString.includes(ph));
                        if (!hasAllPhrases) return false;
                        return group.mustContain.every(t => {
                            if ((t === 'liked' || t === 'positive' || t === 'good') && hasLikes) return true;
                            if ((t === 'disliked' || t === 'negative' || t === 'bad') && hasDislikes) return true;
                            return titleLower.includes(t) || tagsString.includes(t);
                        });
                    });

                    if (metaMatchesGroup) {
                        hits.push({
                            conversationId: conv.id,
                            conversationTitle: conv.title,
                            messageId: conv.messages[0]?.id || 'meta-match',
                            timestamp: conv.createdAt,
                            snippet: conv.messages[0]?.content || "Matched via Title or Tags",
                            score: 100
                        });
                    }

                    conv.messages.forEach(msg => {
                        const contentLower = msg.content.toLowerCase();
                        const matchesGroup = parsedQuery.orGroups.some(group => {
                            const hasExcluded = group.mustExclude.some(ex => contentLower.includes(ex));
                            if (hasExcluded) return false;
                            const hasAllPhrases = group.exactPhrases.every(ph => contentLower.includes(ph));
                            if (!hasAllPhrases) return false;
                            const hasAllTerms = group.mustContain.every(t => {
                                if (config.isFuzzy && t.length > 3) return fuzzySearchText(msg.content, t);
                                return contentLower.includes(t);
                            });
                            return hasAllTerms;
                        });

                        if (matchesGroup) {
                            let score = 0;
                            parsedQuery.orGroups.forEach(g => {
                                g.mustContain.forEach(t => { score += contentLower.split(t).length - 1; });
                                g.exactPhrases.forEach(p => { score += (contentLower.split(p).length - 1) * 2; });
                            });
                            hits.push({
                                conversationId: conv.id,
                                conversationTitle: conv.title,
                                messageId: msg.id,
                                timestamp: msg.timestamp || conv.createdAt,
                                snippet: msg.content,
                                score: score || 1
                            });
                        }
                    });
                });

                const uniqueIds = new Set();
                const uniqueHits = hits.filter(hit => {
                    const key = hit.conversationId + hit.messageId;
                    if (uniqueIds.has(key)) return false;
                    uniqueIds.add(key);
                    return true;
                });

                return uniqueHits.sort((a, b) => {
                    if (config.sortOrder === 'relevance') {
                        if (b.score !== a.score) return b.score - a.score;
                        return b.timestamp - a.timestamp;
                    }
                    if (config.sortOrder === 'oldest') return a.timestamp - b.timestamp;

                            React.createElement('span', { className: 'text-[10px] font-bold text-slate-400 uppercase tracking-widest' }, msg.role),
                            msg.role === 'user' && React.createElement('div', { className: 'w-6 h-6 bg-indigo-500 rounded flex items-center justify-center text-white' }, React.createElement(Lucide.User, { className: 'w-4 h-4' }))
                        ),
                        React.createElement('div', { className: cn('p-4 rounded-2xl shadow-sm text-sm leading-relaxed whitespace-pre-wrap', msg.role === 'user' ? 'bg-slate-800 text-white ml-12 rounded-tr-none' : 'bg-white border border-slate-200 mr-12 rounded-tl-none') },
                            React.createElement(HyperlinkedText, { content: msg.content, onSearch: onSearch })
                        )
                    ))
                )
            );
        };

        /**
         * STORAGE (IndexedDB for large data)
         */
        const dbStorage = {
            dbName: 'ChatKeeperDB',
            storeName: 'data',
            key: 'chatkeeper_data',
            
            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.storeName)) {
                            db.createObjectStore(this.storeName);
                        }
                    };
                    request.onsuccess = (e) => resolve(e.target.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },

            async get() {
                const db = await this.init();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(this.storeName, 'readonly');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.get(this.key);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            async set(value) {
                const db = await this.init();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(this.storeName, 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.put(value, this.key);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        };

        /**
         * MAIN APP
         */
        const App = () => {
            const [isActivated, setIsActivated] = useState(false);
            const [conversations, setConversations] = useState([]);
            const [folders, setFolders] = useState([]);
            const [activeView, setActiveView] = useState('library');
            const [selectedChatId, setSelectedChatId] = useState(null);
            const [searchConfig, setSearchConfig] = useState({ term: '', isFuzzy: false, includeHidden: false, sortOrder: 'newest' });
            const [isImporting, setIsImporting] = useState(false);
            const [importProgress, setImportProgress] = useState(0);
            const [isLoaded, setIsLoaded] = useState(false);

            useEffect(() => {
                const loadData = async () => {
                    setIsActivated(checkLicense());
                    
                    // Try IndexedDB first
                    let data = await dbStorage.get();
                    
                    // Fallback to localStorage for migration
                    if (!data) {
                        const saved = localStorage.getItem('chatkeeper_data');
                        if (saved) {
                            try {
                                data = JSON.parse(saved);
                                // Migrate to IndexedDB
                                await dbStorage.set(data);
                                // Clear localStorage to free up space
                                localStorage.removeItem('chatkeeper_data');
                            } catch (e) {
                                console.error("Failed to parse localStorage data", e);
                            }
                        }
                    }

                    if (data) {
                        setConversations(data.conversations || []);
                        setFolders(data.folders || []);
                    }
                    setIsLoaded(true);
                };
                loadData();
            }, []);

            useEffect(() => {
                if (!isLoaded) return;
                const saveData = async () => {
                    try {
                        await dbStorage.set({ conversations, folders });
                    } catch (e) {
                        console.error("Failed to save to IndexedDB", e);
                    }
                };
                saveData();
            }, [conversations, folders, isLoaded]);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        setIsImporting(true);
                        const raw = JSON.parse(event.target.result);
                        const parsed = [];
                        const total = raw.length;
                        
                        for (let i = 0; i < total; i++) {
                            parsed.push(parseConversation(raw[i]));
                            if (i % 50 === 0) {
                                setImportProgress(Math.round((i / total) * 100));
                                await new Promise(r => setTimeout(r, 0));
                            }
                        }
                        
                        setConversations(parsed);
                        setIsImporting(false);
                        setImportProgress(0);
                    } catch (err) {
                        alert('Error parsing file: ' + err.message);
                        setIsImporting(false);
                    }
                };
                reader.readAsText(file);
            };

            const onToggleStar = (id) => {
                setConversations(prev => prev.map(c => c.id === id ? { ...c, isStarred: !c.isStarred } : c));
            };

            const onToggleHidden = (id) => {
                setConversations(prev => prev.map(c => c.id === id ? { ...c, isHidden: !c.isHidden } : c));
            };

            const onMagicSort = () => {
                const newFolders = [...folders];
                const updatedConvs = conversations.map(c => {
                    if (c.folderId) return c;
                    const topic = c.analysis.topic;
                    let folder = newFolders.find(f => f.name === topic);
                    if (!folder) {
                        folder = { id: Math.random().toString(36).substr(2, 9), name: topic };
                        newFolders.push(folder);
                    }
                    return { ...c, folderId: folder.id };
                });
                setFolders(newFolders);
                setConversations(updatedConvs);
                alert('Magic Sort Complete! Organized chats by topic.');
            };

            if (!isActivated) {
                return React.createElement('div', { className: 'min-h-screen bg-slate-900 flex items-center justify-center p-4' },
                    React.createElement('div', { className: 'bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden p-8 text-center' },
                        React.createElement(Lucide.Lock, { className: 'w-16 h-16 mx-auto mb-4 text-indigo-600' }),
                        React.createElement('h1', { className: 'text-2xl font-bold mb-4' }, 'ChatKeeper Activation'),
                        React.createElement('p', { className: 'text-slate-500 mb-6' }, 'Enter your license key to unlock your library.'),
                        React.createElement('input', {
                            type: 'text',
                            placeholder: 'XXXX-XXXX-XXXX-XXXX',
                            className: 'w-full p-3 border border-slate-200 rounded-xl mb-4 font-mono text-center',
                            onKeyDown: async (e) => {
                                if (e.key === 'Enter') {
                                    const res = await activateLicense(e.target.value);
                                    if (res.success) setIsActivated(true);
                                    else alert(res.error);
                                }
                            }
                        }),
                        React.createElement('p', { className: 'text-xs text-slate-400' }, 'Use CK-FREE-2026 for trial access.')
                    )
                );
            }

            return React.createElement('div', { className: 'flex h-screen bg-slate-50 overflow-hidden' },
                /* Sidebar */
                React.createElement('div', { className: 'w-20 md:w-64 bg-slate-900 text-slate-400 flex flex-col shrink-0' },
                    React.createElement('div', { className: 'p-4 md:p-6 border-b border-slate-800 flex items-center gap-3' },
                        React.createElement('div', { className: 'w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white' }, React.createElement(Lucide.Zap, { className: 'w-5 h-5' })),
                        React.createElement('h1', { className: 'hidden md:block font-bold text-white text-lg' }, 'ChatKeeper')
                    ),
                    React.createElement('nav', { className: 'flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar' },
                        [
                            { id: 'library', icon: Lucide.LayoutGrid, label: 'Library' },
                            { id: 'insights', icon: Lucide.BarChart3, label: 'Insights' },
                            { id: 'collections', icon: Lucide.Star, label: 'Collections' },
                            { id: 'prompts', icon: Lucide.Terminal, label: 'Prompts' }
                        ].map(item => React.createElement('button', {
                            key: item.id,
                            onClick: () => setActiveView(item.id),
                            className: cn('w-full flex items-center gap-3 p-3 rounded-xl transition-all', activeView === item.id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-900/20' : 'hover:bg-slate-800 hover:text-white')
                        }, React.createElement(item.icon, { className: 'w-5 h-5' }), React.createElement('span', { className: 'hidden md:block font-medium' }, item.label)))
                    ),
                    React.createElement('div', { className: 'p-4 border-t border-slate-800' },
                        React.createElement('label', { className: 'w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 cursor-pointer transition-colors' },
                            React.createElement(Lucide.Upload, { className: 'w-5 h-5' }),
                            React.createElement('span', { className: 'hidden md:block font-medium' }, 'Import JSON'),
                            React.createElement('input', { type: 'file', className: 'hidden', accept: '.json', onChange: handleFileUpload })
                        )
                    )
                ),

                /* Main Content */
                React.createElement('div', { className: 'flex-1 flex flex-col min-w-0' },
                    React.createElement(GlobalSearchBar, {
                        config: searchConfig,
                        onChange: (updates) => {
                            setSearchConfig(updates);
                            if (updates.term) setActiveView('search');
                        }
                    }),
                    React.createElement('div', { className: 'flex-1 overflow-hidden' },
                        activeView === 'library' && React.createElement(LibraryView, {
                            conversations, folders, onSelect: setSelectedChatId, onToggleStar, onToggleHidden, onMagicSort
                        }),
                        activeView === 'insights' && React.createElement(InsightsView, {
                            conversations, onSelect: setSelectedChatId, onSearch: (term) => { setSearchConfig({ ...searchConfig, term }); setActiveView('search'); }
                        }),
                        activeView === 'collections' && React.createElement(CollectionsView, {
                            conversations, onSelect: setSelectedChatId, onToggleStar
                        }),
                        activeView === 'prompts' && React.createElement(PromptsView, {
                            conversations, onSelect: setSelectedChatId
                        }),
                        activeView === 'search' && React.createElement(SearchView, {
                            conversations, onSelect: setSelectedChatId, config: searchConfig, onToggleStar, onToggleHidden
                        })
                    )
                ),

                /* Modals */
                selectedChatId && React.createElement(ChatViewer, {
                    conversation: conversations.find(c => c.id === selectedChatId),
                    onClose: () => setSelectedChatId(null),
                    onSearch: (term) => setSearchConfig({ ...searchConfig, term }),
                    onToggleStar,
                    onToggleHidden
                }),

                isImporting && React.createElement('div', { className: 'fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-6' },
                    React.createElement('div', { className: 'bg-white rounded-2xl p-8 w-full max-w-md text-center shadow-2xl' },
                        React.createElement(Lucide.Loader2, { className: 'w-12 h-12 mx-auto mb-4 text-indigo-600 animate-spin' }),
                        React.createElement('h3', { className: 'text-xl font-bold mb-2' }, 'Analyzing Conversations...'),
                        React.createElement('p', { className: 'text-slate-500 mb-6' }, 'Running NLP heuristics and indexing content.'),
                        React.createElement('div', { className: 'w-full bg-slate-100 h-2 rounded-full overflow-hidden' },
                            React.createElement('div', { className: 'bg-indigo-600 h-full transition-all duration-300', style: { width: `${importProgress}%` } })
                        ),
                        React.createElement('p', { className: 'mt-2 text-xs font-bold text-slate-400' }, `${importProgress}% Complete`)
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
