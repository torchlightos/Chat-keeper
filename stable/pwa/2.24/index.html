        const LICENSE_STORAGE_KEY = 'chatkeeper_license_v2';
        const DEVICE_ID_KEY = 'chatkeeper_device_id';

        function getDeviceId() {
            let id = localStorage.getItem(DEVICE_ID_KEY);
            if (!id) {
                id = 'ck-' + Math.random().toString(36).substring(2, 15);
                localStorage.setItem(DEVICE_ID_KEY, id);
            }
            return id;
        }

        async function activateLicense(key) {
            // Simplified check for version 2.24
            if (key === '222' || key === 'CK-FREE-2026' || key.length > 10) {
                const token = {
                    key,
                    deviceId: getDeviceId(),
                    activatedAt: Date.now(),
                    expiresAt: Date.now() + (1000 * 60 * 60 * 24 * 365)
                };
                localStorage.setItem(LICENSE_STORAGE_KEY, JSON.stringify(token));
                return { success: true };
            }
            return { success: false, error: 'Invalid key. Use 222' };
        }

        function checkLicense() {
            const stored = localStorage.getItem(LICENSE_STORAGE_KEY);
            if (!stored) return false;
            try {
                const token = JSON.parse(stored);
                return token.deviceId === getDeviceId() && token.expiresAt > Date.now();
            } catch (e) { return false; }
        }

        function parseConversation(raw) {
            const messages = [];
            const mapping = raw.mapping || {};
            let currentNodeId = raw.current_node;
            const path = [];
            
            while (currentNodeId && mapping[currentNodeId]) {
                const node = mapping[currentNodeId];
                if (node.message) path.unshift(node);
                currentNodeId = node.parent;
            }

            path.forEach(node => {
                const msg = node.message;
                if (!msg || !msg.content || !msg.content.parts) return;
                const content = msg.content.parts.join('\n');
                if (!content.trim()) return;

                messages.push({
                    id: msg.id,
                    role: msg.author.role === 'assistant' ? 'assistant' : 'user',
                    content: content,
                    timestamp: msg.create_time,
                    model: msg.metadata?.model_slug || 'gpt-unknown',
                    raw: msg
                });
            });

            const analysis = runHeuristicAnalysis(messages);
            return {
                id: raw.id || Math.random().toString(36).substr(2, 9),
                title: raw.title || 'Untitled Conversation',
                createdAt: raw.create_time * 1000,
                updatedAt: raw.update_time * 1000,
                messages,
                tags: generateTags(analysis, messages),
                analysis,
                isStarred: false,
                isHidden: false
            };
        }

        function runHeuristicAnalysis(messages) {
            const fullText = messages.map(m => m.content).join(' ');
            const wordCount = fullText.split(/\s+/).length;
            const codeBlockCount = (fullText.match(/```/g) || []).length / 2;
            
            const topics = {
                'Coding': ['code', 'function', 'api', 'react', 'python', 'javascript', 'error', 'css'],
                'Creative': ['story', 'write', 'poem', 'novel', 'plot'],
                'Business': ['marketing', 'strategy', 'revenue', 'product', 'startup'],
                'Learning': ['explain', 'teach', 'how to', 'concept', 'history']
            };

            let topTopic = 'General';
            let maxHits = 0;
            Object.entries(topics).forEach(([topic, keywords]) => {
                let hits = 0;
                fullText.toLowerCase().split(/\W+/).forEach(w => { if (keywords.includes(w)) hits++; });
                if (hits > maxHits) { maxHits = hits; topTopic = topic; }
            });

            return {
                topic: topTopic,
                wordCount,
                codeBlockCount,
                importanceScore: Math.min(100, Math.floor((wordCount / 150) + (codeBlockCount * 15))),
                modelsUsed: [...new Set(messages.map(m => m.model).filter(m => m !== 'gpt-unknown'))]
            };
        }

        function generateTags(analysis, messages) {
            const tags = [`Topic: ${analysis.topic}`, `Length: ${analysis.wordCount > 1000 ? 'Long' : 'Short'}`];
            if (analysis.codeBlockCount > 0) tags.push('Feature: Code');
            analysis.modelsUsed.forEach(m => tags.push(`Model: ${m}`));
            return tags;
        }

        const HyperlinkedText = ({ content, onSearch }) => {

                    const [full, prefix, word, suffix] = match;

                        React.createElement('span', {

                const content = await zip.generateAsync({ type: "blob" });
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;

                setSelectedIds(new Set());

                    React.createElement('span', { className: 'font-bold' }, `${selectedIds.size} Selected`),
                    React.createElement('button', { onClick: handleBatchExport, className: 'bg-indigo-600 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 hover:bg-indigo-500 transition-colors' }, React.createElement(Lucide.Download, { className: 'w-4 h-4' }), 'Batch Export (ZIP)'),
                    React.createElement('button', { onClick: () => setSelectedIds(new Set()), className: 'text-slate-400 hover:text-white' }, 'Cancel')
                ),

                        }, selectedIds.has(conv.id) && React.createElement(Lucide.Check, { className: 'w-3 h-3 text-white' })),

                                React.createElement(Lucide.Star, { className: cn('w-4 h-4', conv.isStarred ? 'fill-amber-400 text-amber-400' : 'text-slate-300') }))
                        ),
                        React.createElement('h3', { className: 'font-bold text-slate-800 line-clamp-2 mb-3 h-10' }, conv.title),
                        React.createElement('div', { className: 'flex items-center justify-between mt-auto pt-4 border-t border-slate-50' },
                            React.createElement('span', { className: 'text-[10px] text-slate-400' }, new Date(conv.createdAt).toLocaleDateString()),
                            React.createElement('div', { className: 'flex items-center gap-1 bg-slate-100 px-2 py-1 rounded text-[10px] font-bold' }, 
                                React.createElement(Lucide.BarChart, { className: 'w-3 h-3' }), conv.analysis.importanceScore)
                        )
                    ))
                )
            );
        };

            const InsightsView = ({ conversations }) => {
            const stats = useMemo(() => {
                const modelCounts = {};
                const topicCounts = {};
                conversations.forEach(c => {
                    c.analysis.modelsUsed.forEach(m => modelCounts[m] = (modelCounts[m] || 0) + 1);
                    topicCounts[c.analysis.topic] = (topicCounts[c.analysis.topic] || 0) + 1;
                });
                return { models: Object.entries(modelCounts), topics: Object.entries(topicCounts) };
            }, [conversations]);

            return React.createElement('div', { className: 'flex-1 p-8 bg-slate-50 overflow-y-auto custom-scrollbar' },
                React.createElement('h2', { className: 'text-2xl font-bold mb-8' }, 'Personal Intelligence Profile'),
                React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-8' },
                    React.createElement('div', { className: 'bg-white p-6 rounded-2xl shadow-sm' },

                        React.createElement('div', { className: 'space-y-4' },
                            stats.models.map(([name, count]) => React.createElement('div', { key: name },
                                React.createElement('div', { className: 'flex justify-between text-sm mb-1' }, React.createElement('span', { className: 'font-mono' }, name), React.createElement('span', { className: 'font-bold' }, count)),
                                React.createElement('div', { className: 'w-full bg-slate-100 h-2 rounded-full overflow-hidden' }, 
                                    React.createElement('div', { className: 'bg-indigo-500 h-full', style: { width: `${(count / conversations.length) * 100}%` } }))
                            ))
                        )
                    ),
                    React.createElement('div', { className: 'bg-white p-6 rounded-2xl shadow-sm' },
                        React.createElement('h3', { className: 'font-bold text-slate-400 uppercase text-xs tracking-widest mb-6' }, 'Focus Topics'),
                        React.createElement('div', { className: 'flex flex-wrap gap-2' },
                            stats.topics.map(([name, count]) => React.createElement('div', { key: name, className: 'px-4 py-2 bg-slate-50 border border-slate-100 rounded-xl flex items-center gap-3' },
                                React.createElement('span', { className: 'font-bold text-slate-800' }, name),
                                React.createElement('span', { className: 'text-xs text-indigo-500 font-mono' }, count)
                            ))

        const ChatViewer = ({ conversation, onClose, onSearch }) => {

                        ),
                        React.createElement('div', { className: cn('p-5 rounded-2xl shadow-sm text-sm leading-relaxed relative group', msg.role === 'user' ? 'bg-slate-800 text-white rounded-tr-none' : 'bg-white border border-slate-200 rounded-tl-none') },
                            React.createElement(HyperlinkedText, { content: msg.content, onSearch: onSearch }),
                            React.createElement('div', { className: 'absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity flex gap-1' },
                                React.createElement('button', { 
                                    onClick: () => copyForAI(msg.content),
                                    className: 'p-1.5 bg-slate-700/50 hover:bg-indigo-600 text-white rounded-md text-xs flex items-center gap-1 transition-all',
                                    title: "Copy clean prompt text"
                                }, React.createElement(Lucide.ClipboardCopy, { className: 'w-3 h-3' })),
                                React.createElement('button', { 
                                    onClick: () => setViewRawId(viewRawId === msg.id ? null : msg.id),
                                    className: 'p-1.5 bg-slate-700/50 hover:bg-slate-600 text-white rounded-md text-xs transition-all'
                                }, React.createElement(Lucide.Code, { className: 'w-3 h-3' }))
                            ),
                            viewRawId === msg.id && React.createElement('pre', { className: 'mt-4 p-4 bg-black/20 rounded-lg text-[10px] overflow-x-auto font-mono text-indigo-300' }, 
                                JSON.stringify(msg.raw, null, 2))
                        )
                    ))
                )
            );
        };

        const dbStorage = {
            dbName: 'ChatKeeperDB',
            storeName: 'data',
            key: 'chatkeeper_data',
            async init() {
                return new Promise((resolve) => {
                    const req = indexedDB.open(this.dbName, 1);
                    req.onupgradeneeded = (e) => {
                        if (!e.target.result.objectStoreNames.contains(this.storeName)) e.target.result.createObjectStore(this.storeName);
                    };
                    req.onsuccess = (e) => resolve(e.target.result);
                });
            },
            async get() {
                const db = await this.init();
                return new Promise(r => {
                    const req = db.transaction(this.storeName, 'readonly').objectStore(this.storeName).get(this.key);
                    req.onsuccess = () => r(req.result);
                });
            },
            async set(val) {
                const db = await this.init();
                return new Promise(r => {
                    const req = db.transaction(this.storeName, 'readwrite').objectStore(this.storeName).put(val, this.key);
                    req.onsuccess = () => r();
                });
            }
        };

        const App = () => {

            }, []);

            useEffect(() => {
