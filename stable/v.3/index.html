<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Keeper Pro v3.0</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        :root { --accent: #8b5cf6; --accent-hover: #7c3aed; }
        body { font-family: 'Inter', sans-serif; background: #0b0f1a; color: #e5e7eb; }
        .mono { font-family: 'Fira Code', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .chat-user { background: #1e293b; align-self: flex-end; border-radius: 1.25rem 1.25rem 0.25rem 1.25rem; border: 1px solid #334155; }
        .chat-assistant { background: #064e3b; align-self: flex-start; border-radius: 1.25rem 1.25rem 1.25rem 0.25rem; border: 1px solid #065f46; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .list-view { display: flex; flex-direction: column; gap: 0.75rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-violet-500/30">

    <!-- LOCK SCREEN -->
    <div id="lock-screen" class="fixed inset-0 bg-[#0b0f1a] flex items-center justify-center p-6 z-[9999] text-center">
        <div class="max-w-md w-full space-y-8 animate-in">
            <div class="bg-violet-500/10 w-24 h-24 rounded-3xl flex items-center justify-center mx-auto border border-violet-500/30 rotate-3">
                <i data-lucide="shield-check" class="w-12 h-12 text-violet-500"></i>
            </div>
            <div>
                <h1 id="lock-title" class="text-4xl font-black text-white mb-3 tracking-tight">Vault Locked</h1>
                <p id="lock-msg" class="text-gray-400 text-lg">Enter master key <span class="text-violet-400">222</span></p>
            </div>
            <div class="space-y-4">
                <input type="text" id="keyInput" placeholder="CK-XXXX" class="w-full bg-gray-900 border border-gray-800 rounded-2xl px-6 py-4 text-center text-2xl font-mono focus:border-violet-500 outline-none transition">
                <button onclick="activateKey()" class="w-full bg-violet-600 hover:bg-violet-700 py-4 rounded-2xl font-bold text-lg shadow-lg">Unlock v3.0 Archive</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-content" class="flex flex-col h-screen overflow-hidden hidden">
        <header class="h-16 border-b border-gray-800/60 px-6 flex justify-between items-center bg-[#0b0f1a]/80 backdrop-blur-md z-50">
            <div class="flex items-center gap-3">
                <div class="bg-violet-600 p-1.5 rounded-lg"><i data-lucide="database" class="w-5 h-5 text-white"></i></div>
                <h1 class="text-lg font-bold">Chat Keeper <span class="text-violet-400 text-[10px] mono ml-2">v3.0 PRO</span></h1>
            </div>
            <div class="flex gap-3 items-center">
                <button id="installBtn" class="hidden bg-gray-800 px-4 py-2 rounded-xl text-sm border border-gray-700">Install App</button>
                <input type="file" id="fileInput" class="hidden" accept=".json">
                <button onclick="document.getElementById('fileInput').click()" class="bg-violet-600 hover:bg-violet-700 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition">
                    <i data-lucide="plus-circle" class="w-4"></i> Import
                </button>
                <button onclick="resetLicense()" class="p-2 text-gray-500 hover:text-red-500"><i data-lucide="log-out" class="w-4"></i></button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-64 border-r border-gray-800/60 p-4 hidden md:flex flex-col gap-2">
                <nav class="space-y-1 flex-1">
                    <button onclick="setView('library')" id="nav-library" class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl hover:bg-gray-800/50 transition text-sm">
                        <div class="flex items-center gap-3"><i data-lucide="layers" class="w-4"></i> Library</div>
                        <span id="count-library" class="mono text-[10px]">0</span>
                    </button>
                    <button onclick="setView('collections')" id="nav-collections" class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl hover:bg-gray-800/50 transition text-sm">
                        <div class="flex items-center gap-3"><i data-lucide="star" class="w-4 text-yellow-500"></i> Starred</div>
                        <span id="count-starred" class="mono text-[10px]">0</span>
                    </button>
                    <button onclick="setView('timeline')" id="nav-timeline" class="w-full flex items-center px-3 py-2.5 rounded-xl hover:bg-gray-800/50 transition text-sm gap-3">
                        <i data-lucide="calendar" class="w-4"></i> Timeline
                    </button>
                </nav>
            </aside>

            <main class="flex-1 flex flex-col bg-[#0d121f]">
                <div class="p-4 border-b border-gray-800/60 flex flex-col gap-4">
                    <div class="flex items-center gap-3">
                        <div class="relative flex-1">
                            <i data-lucide="search" class="absolute left-4 top-3.5 w-4 text-gray-500"></i>
                            <input type="text" id="searchInput" placeholder="Search archive..." class="w-full bg-gray-900 border border-gray-800 rounded-2xl py-3 pl-11 pr-4 focus:border-violet-500 outline-none">
                        </div>
                        <button onclick="toggleExportMenu()" class="bg-gray-900 hover:bg-gray-800 p-3 rounded-xl border border-gray-800 relative group">
                            <i data-lucide="download" class="w-5 text-violet-400"></i>
                            <!-- Export Dropdown -->
                            <div id="exportMenu" class="hidden absolute right-0 top-full mt-2 w-48 bg-gray-900 border border-gray-800 rounded-xl shadow-2xl overflow-hidden z-[100]">
                                <button onclick="exportAs('json')" class="w-full text-left px-4 py-3 text-xs hover:bg-violet-600/20 border-b border-gray-800">Archive (JSON)</button>
                                <button onclick="exportAs('txt')" class="w-full text-left px-4 py-3 text-xs hover:bg-violet-600/20 border-b border-gray-800">Readable (TEXT)</button>
                                <button onclick="exportAs('md')" class="w-full text-left px-4 py-3 text-xs hover:bg-violet-600/20">NotebookLM (MD)</button>
                            </div>
                        </button>
                    </div>
                </div>

                <div id="contentArea" class="flex-1 overflow-y-auto p-6 custom-scrollbar">
                    <div id="chatGrid" class="grid-view"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- MODAL -->
    <div id="detailModal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#0b0f1a] border border-gray-800 w-full max-w-5xl h-[85vh] rounded-3xl flex flex-col overflow-hidden animate-in">
            <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900/50">
                <h2 id="modalTitle" class="font-bold truncate text-lg">Detail</h2>
                <div class="flex items-center gap-2">
                    <button onclick="reviveConversation()" class="p-2 text-violet-400 hover:bg-violet-500/10 rounded-lg"><i data-lucide="refresh-cw" class="w-4"></i></button>
                    <button id="modalStarBtn" class="p-2 hover:bg-gray-800 rounded-lg"><i data-lucide="star" class="w-4"></i></button>
                    <button onclick="closeModal()" class="p-2 text-gray-500 hover:text-red-500"><i data-lucide="x" class="w-5"></i></button>
                </div>
            </header>
            <div id="modalTranscript" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4 custom-scrollbar"></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-violet-600 text-white rounded-xl opacity-0 transition-all z-[200]"></div>

    <script>
        let db, allChats = [], starredIds = new Set(), activeChatId = null, deferredPrompt, currentView = 'library';

        const initDB = () => new Promise(r => {
            const req = indexedDB.open("ChatKeeperV3", 1);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                d.createObjectStore("archive", { keyPath: "id" });
                d.createObjectStore("meta", { keyPath: "id" });
            };
            req.onsuccess = e => { db = e.target.result; r(); };
        });

        async function loadData() {
            const tx = db.transaction(["archive", "meta"], "readonly");
            allChats = await new Promise(r => { const req = tx.objectStore("archive").getAll(); req.onsuccess = () => r(req.result); });
            const metas = await new Promise(r => { const req = tx.objectStore("meta").getAll(); req.onsuccess = () => r(req.result); });
            starredIds = new Set(metas.filter(m => m.starred).map(m => m.id));
            updateUI();
        }

        async function activateKey() {
            if (document.getElementById('keyInput').value === '222') {
                localStorage.setItem('ck_v3_key', '222');
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                await initDB(); await loadData();
            }
        }

        document.getElementById('fileInput').onchange = async e => {
            const text = await e.target.files[0].text();
            const raw = JSON.parse(text);
            const processed = raw.map(c => ({
                id: c.id, title: c.title || "Untitled", date: new Date(c.create_time * 1000).toLocaleDateString(),
                messages: Object.values(c.mapping || {}).filter(m => m.message?.content?.parts).map(m => ({
                    role: m.message.author.role, text: m.message.content.parts.join('\n')
                }))
            })).filter(c => c.messages.length > 0);
            const tx = db.transaction("archive", "readwrite");
            processed.forEach(c => tx.objectStore("archive").put(c));
            showToast(`Imported ${processed.length} chats`);
            loadData();
        };

        function renderGrid(chats) {
            document.getElementById('chatGrid').innerHTML = chats.map(c => `
                <div onclick="viewDetail('${c.id}')" class="bg-gray-900/40 border ${starredIds.has(c.id) ? 'border-yellow-500/40' : 'border-gray-800'} p-5 rounded-2xl hover:border-violet-500/50 cursor-pointer transition">
                    <h3 class="font-bold mb-2 truncate">${c.title}</h3>
                    <p class="text-xs text-gray-500 line-clamp-2">${c.messages[0]?.text || ''}</p>
                    <div class="mt-4 pt-3 border-t border-gray-800 text-[10px] text-gray-600 flex justify-between">
                        <span>${c.date}</span>
                        <span>${c.messages.length} messages</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function viewDetail(id) {
            activeChatId = id;
            const c = allChats.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = c.title;
            document.getElementById('modalTranscript').innerHTML = c.messages.map(m => `
                <div class="${m.role === 'user' ? 'chat-user' : 'chat-assistant'} p-4 max-w-[90%] text-sm">
                    <p class="font-black text-[9px] uppercase opacity-40 mb-2">${m.role}</p>
                    <div class="whitespace-pre-wrap">${m.text}</div>
                </div>
            `).join('');
            
            const starBtn = document.getElementById('modalStarBtn');
            starBtn.innerHTML = `<i data-lucide="star" class="w-4 ${starredIds.has(id) ? 'fill-yellow-500 text-yellow-500' : ''}"></i>`;
            starBtn.onclick = () => { toggleStar(id); viewDetail(id); };

            document.getElementById('detailModal').classList.remove('hidden');
            lucide.createIcons();
        }

        async function toggleStar(id) {
            const tx = db.transaction("meta", "readwrite");
            const store = tx.objectStore("meta");
            const isStarred = starredIds.has(id);
            if (isStarred) {
                starredIds.delete(id);
                store.put({ id, starred: false });
            } else {
                starredIds.add(id);
                store.put({ id, starred: true });
            }
            updateUI();
        }

        function toggleExportMenu() { document.getElementById('exportMenu').classList.toggle('hidden'); }

        function exportAs(format) {
            const data = allChats.filter(c => currentView !== 'collections' || starredIds.has(c.id));
            let content = "", mime = "text/plain", ext = "txt";

            if (format === 'json') {
                content = JSON.stringify(data, null, 2);
                mime = "application/json"; ext = "json";
            } else {
                data.forEach(c => {
                    content += `\n--- CONVERSATION: ${c.title} (${c.date}) ---\n\n`;
                    c.messages.forEach(m => {
                        content += `${m.role.toUpperCase()}: ${m.text}\n\n`;
                    });
                });
                if (format === 'md') ext = "md";
            }

            const blob = new Blob([content], { type: mime });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `ChatKeeper_V3_Export.${ext}`;
            a.click();
            toggleExportMenu();
        }

        function setView(v) { currentView = v; updateUI(); }
        function updateUI() { 
            const filtered = currentView === 'collections' ? allChats.filter(c => starredIds.has(c.id)) : allChats;
            document.getElementById('count-library').innerText = allChats.length;
            document.getElementById('count-starred').innerText = starredIds.size;
            renderGrid(filtered);
        }
        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function resetLicense() { localStorage.clear(); location.reload(); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('opacity-100'); setTimeout(() => t.classList.remove('opacity-100'), 2000); }
        
        window.onload = () => { if (localStorage.getItem('ck_v3_key')) activateKey(); lucide.createIcons(); };
    </script>
</body>
</html>
