<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Keeper Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .chat-user { background: #374151; align-self: flex-end; border-radius: 15px 15px 0 15px; border: 1px solid #4b5563; }
        .chat-assistant { background: #065f46; align-self: flex-start; border-radius: 15px 15px 15px 0; border: 1px solid #059669; }
        #lock-screen { z-index: 9999; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col">

    <!-- LICENSE LOCK SCREEN -->
    <div id="lock-screen" class="fixed inset-0 bg-gray-900 flex items-center justify-center p-6 hidden text-center">
        <div class="max-w-md w-full space-y-6">
            <div class="bg-violet-500/10 w-20 h-20 rounded-full flex items-center justify-center mx-auto border border-violet-500/30">
                <i data-lucide="shield-check" class="w-10 h-10 text-violet-500"></i>
            </div>
            <div>
                <h1 id="lock-title" class="text-3xl font-bold text-white mb-2">Activation Required</h1>
                <p id="lock-msg" class="text-gray-400">Please enter your license key to unlock Chat Keeper Pro.</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="keyInput" placeholder="CK-XXXX-XXXX" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-center text-xl font-mono focus:border-violet-500 outline-none transition">
                <button onclick="activateKey()" class="w-full bg-violet-600 hover:bg-violet-700 py-3 rounded-xl font-bold transition">Activate Access</button>
            </div>
            <p class="text-xs text-gray-500 italic">Licenses are bound to this browser installation.</p>
        </div>
    </div>

    <!-- MAIN APP CONTENT (Hidden until licensed) -->
    <div id="app-content" class="flex flex-col h-screen">
        <header class="border-b border-gray-800 p-4 flex justify-between items-center bg-gray-900 sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <i data-lucide="database" class="text-violet-500"></i>
                <h1 class="text-xl font-bold tracking-tight">Chat Keeper <span class="text-xs text-violet-400 font-mono">v2.0</span></h1>
            </div>
            <div class="flex gap-4 items-center">
                <button id="installBtn" class="hidden bg-violet-600 hover:bg-violet-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">Install App</button>
                <input type="file" id="fileInput" class="hidden" accept=".json">
                <button onclick="document.getElementById('fileInput').click()" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg text-sm border border-gray-700 flex items-center gap-2 transition">
                    <i data-lucide="upload-cloud" class="w-4"></i> Import JSON
                </button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-64 border-r border-gray-800 p-4 hidden md:flex flex-col gap-6">
                <nav class="space-y-2">
                    <button onclick="setView('library')" id="nav-library" class="w-full flex items-center gap-3 px-3 py-2 rounded-md bg-gray-800 text-white">
                        <i data-lucide="layout-grid" class="w-4"></i> Library
                    </button>
                    <button onclick="setView('collections')" id="nav-collections" class="w-full flex items-center gap-3 px-3 py-2 rounded-md hover:bg-gray-800 text-gray-400 hover:text-white transition">
                        <i data-lucide="star" class="w-4 text-yellow-500"></i> Collections
                    </button>
                </nav>
                
                <div class="mt-auto p-4 bg-gray-800/50 rounded-xl border border-gray-700">
                    <p class="text-xs text-gray-400 uppercase font-bold mb-2 tracking-wider">License Status</p>
                    <div id="licenseInfo" class="text-xs text-violet-400 font-mono truncate">Checking...</div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 flex flex-col min-w-0">
                <div class="p-4 border-b border-gray-800 bg-gray-900/50 backdrop-blur flex flex-wrap gap-4">
                    <div class="relative flex-1 min-w-[200px]">
                        <i data-lucide="search" class="absolute left-3 top-2.5 w-4 text-gray-500"></i>
                        <input type="text" id="searchInput" placeholder="Search conversations..." class="w-full bg-gray-800 border border-gray-700 rounded-lg py-2 pl-10 pr-4 focus:outline-none focus:border-violet-500 transition">
                    </div>
                    <button onclick="exportSelected()" class="bg-gray-800 hover:bg-gray-700 p-2 rounded-lg border border-gray-700 group" title="Export All Data">
                        <i data-lucide="download" class="w-5 text-violet-400 group-hover:scale-110 transition"></i>
                    </button>
                </div>

                <div id="chatGrid" class="flex-1 overflow-y-auto p-6 grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6 custom-scrollbar">
                    <div class="col-span-full text-center py-20 text-gray-500">
                        <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                        <p>No conversations loaded. Import your ChatGPT export to begin.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Detail View Modal -->
    <div id="detailModal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-gray-900 border border-gray-700 w-full max-w-4xl h-[85vh] rounded-2xl flex flex-col overflow-hidden shadow-2xl">
            <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-800/50">
                <h2 id="modalTitle" class="font-bold truncate pr-4 text-lg">Conversation Detail</h2>
                <div class="flex items-center gap-3">
                    <button id="modalStarBtn" class="p-2 hover:bg-gray-700 rounded-full transition"><i data-lucide="star" class="w-5"></i></button>
                    <button onclick="closeModal()" class="p-2 hover:bg-red-900/30 text-gray-400 hover:text-red-500 rounded-full transition"><i data-lucide="x" class="w-6"></i></button>
                </div>
            </header>
            <div id="modalTranscript" class="flex-1 overflow-y-auto p-6 flex flex-col gap-6 custom-scrollbar bg-gray-900/50"></div>
        </div>
    </div>

    <script>
        // --- 1. MOTHERSHIP LICENSE GATE ---
        const LICENSE_REGISTRY = {
            "DEV-TEST-0000": { expires: "2099-12-31", status: "active", name: "Developer" },
            "LADY-GARDENER-2025": { expires: "2026-03-09", status: "active", name: "User 1" }
        };

        function checkLicense() {
            const savedKey = localStorage.getItem('chatkeeper_license_key');
            const now = new Date();

            if (!savedKey || !LICENSE_REGISTRY[savedKey]) {
                showLockScreen("Activation Required", "Please enter your license key to continue.");
                return false;
            }

            const license = LICENSE_REGISTRY[savedKey];
            const expiryDate = new Date(license.expires);

            if (now > expiryDate || license.status !== 'active') {
                showLockScreen("License Issue", "Your license has expired or been revoked.");
                return false;
            }

            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('licenseInfo').innerText = `Key: ${savedKey}\nExp: ${license.expires}`;
            return true;
        }

        function showLockScreen(title, msg) {
            document.getElementById('lock-screen').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('lock-title').innerText = title;
            document.getElementById('lock-msg').innerText = msg;
        }

        function activateKey() {
            const input = document.getElementById('keyInput').value.trim().toUpperCase();
            if (LICENSE_REGISTRY[input]) {
                localStorage.setItem('chatkeeper_license_key', input);
                location.reload();
            } else {
                alert("Invalid License Key.");
            }
        }

        // --- 2. CORE APP LOGIC ---
        let db;
        let allChats = [];
        let starredIds = new Set();
        let deferredPrompt;
        let currentView = 'library';

        // IndexedDB
        const request = indexedDB.open("ChatKeeperDB", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("starred", { keyPath: "id" });
        };
        request.onsuccess = e => {
            db = e.target.result;
            loadStarred();
        };

        async function loadStarred() {
            const tx = db.transaction("starred", "readonly");
            const store = tx.objectStore("starred");
            const keys = await new Promise(r => {
                const req = store.getAllKeys();
                req.onsuccess = () => r(req.result);
            });
            starredIds = new Set(keys);
        }

        // Parser with error handling
        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            try {
                const text = await file.text();
                const rawData = JSON.parse(text);
                
                allChats = rawData.map(chat => {
                    try {
                        const messages = Object.values(chat.mapping || {})
                            .filter(m => m.message && m.message.content && m.message.content.parts)
                            .map(m => ({
                                role: m.message.author.role,
                                text: m.message.content.parts.filter(p => typeof p === 'string').join('\n'),
                                model: m.message.metadata?.model_slug || 'Default'
                            }))
                            .filter(m => m.text.trim().length > 0);

                        return {
                            id: chat.id,
                            title: chat.title || "Untitled Conversation",
                            date: new Date(chat.create_time * 1000).toLocaleDateString(),
                            rawDate: chat.create_time,
                            interactionMode: messages.filter(m => m.role === 'user').length > 2 ? 'Discussion' : 'Question',
                            messages: messages
                        };
                    } catch (err) {
                        return null; // Skip malformed chats
                    }
                }).filter(c => c !== null && c.messages.length > 0);

                renderGrid();
            } catch (err) {
                alert("Failed to parse JSON. Please ensure it is a valid ChatGPT export.");
                console.error(err);
            }
        };

        function renderGrid() {
            const grid = document.getElementById('chatGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allChats.filter(chat => chat.title.toLowerCase().includes(searchTerm));
            
            if (currentView === 'collections') {
                filtered = filtered.filter(chat => starredIds.has(chat.id));
            }

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500">No results found.</div>`;
                return;
            }

            grid.innerHTML = filtered.map(chat => `
                <div class="bg-gray-800 border ${starredIds.has(chat.id) ? 'border-yellow-500/50' : 'border-gray-700'} rounded-xl p-5 hover:border-violet-500 transition-all flex flex-col group">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[10px] font-bold tracking-widest uppercase text-violet-400 bg-violet-400/10 px-2 py-1 rounded">${chat.interactionMode}</span>
                        <button onclick="toggleStar('${chat.id}')" class="p-1 hover:scale-110 transition">
                            <i data-lucide="star" class="w-5 ${starredIds.has(chat.id) ? 'fill-yellow-500 text-yellow-500' : 'text-gray-600'}"></i>
                        </button>
                    </div>
                    <h3 class="font-bold text-lg mb-2 truncate">${chat.title}</h3>
                    <p class="text-sm text-gray-400 line-clamp-2 mb-4 italic opacity-80 leading-relaxed">"${chat.messages[0]?.text || ''}"</p>
                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-700/50">
                        <span class="text-xs text-gray-500">${chat.date}</span>
                        <button onclick="viewDetail('${chat.id}')" class="text-sm text-violet-400 font-bold hover:text-violet-300 transition">View Chat →</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function toggleStar(id) {
            const tx = db.transaction("starred", "readwrite");
            const store = tx.objectStore("starred");
            
            if (starredIds.has(id)) {
                store.delete(id);
                starredIds.delete(id);
            } else {
                const chat = allChats.find(c => c.id === id);
                store.put(chat);
                starredIds.add(id);
            }
            renderGrid();
        }

        function setView(view) {
            currentView = view;
            document.getElementById('nav-library').classList.toggle('bg-gray-800', view === 'library');
            document.getElementById('nav-collections').classList.toggle('bg-gray-800', view === 'collections');
            renderGrid();
        }

        function viewDetail(id) {
            const chat = allChats.find(c => c.id === id);
            const modal = document.getElementById('detailModal');
            const transcript = document.getElementById('modalTranscript');
            
            document.getElementById('modalTitle').innerText = chat.title;
            
            const starBtn = document.getElementById('modalStarBtn');
            starBtn.onclick = () => { toggleStar(id); viewDetail(id); };
            starBtn.innerHTML = `<i data-lucide="star" class="w-6 ${starredIds.has(id) ? 'fill-yellow-500 text-yellow-500' : ''}"></i>`;

            transcript.innerHTML = chat.messages.map(m => `
                <div class="max-w-[85%] p-4 ${m.role === 'user' ? 'chat-user' : 'chat-assistant'}">
                    <div class="flex items-center gap-2 mb-2 opacity-50">
                        <i data-lucide="${m.role === 'user' ? 'user' : 'bot'}" class="w-3"></i>
                        <span class="text-[10px] uppercase font-bold tracking-tighter">${m.role}</span>
                        ${m.model !== 'Default' ? `<span class="text-[10px] border border-white/20 px-1 rounded">${m.model}</span>` : ''}
                    </div>
                    <div class="text-sm leading-relaxed whitespace-pre-wrap">${m.text}</div>
                </div>
            `).join('');
            
            modal.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }

        function exportSelected() {
            const dataStr = JSON.stringify(allChats, null, 2);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ChatKeeper_Export_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        // Run license check on start
        window.onload = () => {
            lucide.createIcons();
            if (checkLicense()) {
                // Initialize remaining PWA logic
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    document.getElementById('installBtn').classList.remove('hidden');
                });
            }
        };

        document.getElementById('installBtn').onclick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('installBtn').classList.add('hidden');
            }
        };

        document.getElementById('searchInput').addEventListener('input', renderGrid);
    </script>
</body>
</html>
