<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Keeper Launch Pad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .card-bg {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full card-bg rounded-3xl p-8 shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold tracking-tight text-white mb-2">Chat Keeper</h1>
            <p class="text-slate-400 text-sm">Own your data. Search your history. No tracking.</p>
        </header>

        <div class="space-y-4">
            <h3 class="text-xs font-semibold uppercase tracking-widest text-blue-500 ml-1">Active Releases</h3>
            
            <!-- Version 1.0 Link -->
            <a href="https://chatkeeper-v1-11-12-778754087238.us-west1.run.app/" 
               target="_blank" 
               class="flex flex-col p-4 rounded-2xl bg-slate-800/40 hover:bg-blue-600/10 border border-slate-700 hover:border-blue-500/50 transition-all group">
                <div class="flex items-center justify-between mb-1">
                    <span class="font-bold text-white group-hover:text-blue-400">Version 1.0</span>
                    <span class="px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-400 text-[10px] font-bold uppercase">Stable</span>
                </div>
                <span class="text-xs text-slate-400">Cloud Run • Locally Processed</span>
            </a>

            <!-- Mobile v4.7.3 Link -->
            <a href="https://torchlightos.github.io/Chat-keeper/stable/mobile/4.7.2/index.html" 
               target="_blank" 
               class="flex flex-col p-4 rounded-2xl bg-blue-600/10 border border-blue-500/30 hover:bg-blue-600/20 hover:border-blue-400 transition-all group">
                <div class="flex items-center justify-between mb-1">
                    <span class="font-bold text-blue-100 group-hover:text-white">Mobile v4.7.3</span>
                    <span class="px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-300 text-[10px] font-bold uppercase tracking-wider">New Mobile</span>
                </div>
                <span class="text-xs text-blue-200/60">Optimized for iOS & Android</span>
            </a>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-800">
            <h3 class="text-xs font-semibold uppercase tracking-widest text-slate-500 mb-3 ml-1">Trial</h3>
            <div class="p-4 rounded-2xl bg-slate-900/50 border border-slate-800 text-center">
                <p class="text-xs text-slate-500 italic">Download Demo (Coming Soon)</p>
            </div>
        </div>

        <footer class="mt-12 text-center">
            <p class="text-xs italic text-slate-600 font-serif">"Minimal motion, maximum reward."</p>
        </footer>
    </div>

</body>
</html>
